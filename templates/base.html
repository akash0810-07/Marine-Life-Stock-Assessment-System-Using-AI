<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}OceanWatch{% endblock %} — Marine Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
--deep:#010c18;
--mid:#041525;
--surface:#072540;
--biolume:#00e8b8;
--biolume2:#00bfff;
--coral:#ff5e5b;
--warning:#ffc13b;
--danger:#f02d3a;
--safe:#06d6a0;
--text:#dff0f8;
--muted:#6da5be;
--glass:rgba(7,37,64,0.6);
--border:rgba(0,232,184,0.13);
--font-head:'Syne', sans-serif;
--font-mono:'DM Mono', monospace;
}

html { scroll-behavior:smooth; }

body{
font-family:var(--font-mono);
background:var(--deep);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed; inset:0; z-index:-1;
background:
radial-gradient(ellipse 70% 50% at 10% 90%, rgba(0,232,184,.05) 0%, transparent 55%),
radial-gradient(ellipse 50% 60% at 90% 10%, rgba(0,191,255,.04) 0%, transparent 55%),
linear-gradient(180deg,#010c18 0%,#020f1e 100%);
}

#particles{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
.p{position:absolute;border-radius:50%;opacity:0;animation:floatUp linear infinite;}
@keyframes floatUp{
0%{transform:translateY(105vh);opacity:0;}
8%{opacity:.5;}
92%{opacity:.2;}
100%{transform:translateY(-5vh) translateX(30px);opacity:0;}
}

.topbar{
position:sticky; top:0; z-index:200;
display:flex; align-items:center; justify-content:space-between;
padding:.9rem 2rem;
background:rgba(1,12,24,.82);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);
}

.brand{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
.brand-icon{width:38px;height:38px;flex-shrink:0;}

.brand-name{
font-family:var(--font-head);
font-size:1.35rem;
font-weight:800;
letter-spacing:-.02em;
background:linear-gradient(130deg,var(--biolume),var(--biolume2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand-sub{
font-size:.6rem;
color:var(--muted);
letter-spacing:.15em;
text-transform:uppercase;
}

.nav-links{display:flex;gap:.25rem;}

.nav-link{
padding:.5rem 1rem;
font-family:var(--font-mono);
font-size:.72rem;
letter-spacing:.07em;
text-transform:uppercase;
color:var(--muted);
text-decoration:none;
border-radius:6px;
transition:all .25s;
border:1px solid transparent;
}

.nav-link:hover{color:var(--text);background:rgba(0,232,184,.07);}
.nav-link.active{color:var(--biolume);border-color:var(--border);background:rgba(0,232,184,.06);}

.topbar-right{display:flex;align-items:center;gap:1rem;}

.live-pill{
display:flex;align-items:center;gap:.4rem;
font-size:.65rem;color:var(--safe);letter-spacing:.1em;text-transform:uppercase;
}

.live-dot{
width:7px;height:7px;background:var(--safe);border-radius:50%;
animation:blink 1.5s ease-in-out infinite;
box-shadow:0 0 7px var(--safe);
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.page{position:relative;z-index:1;padding:2rem 2rem 3rem;}

.card{
background:var(--glass);
border:1px solid var(--border);
border-radius:14px;
padding:1.5rem;
backdrop-filter:blur(10px);
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--biolume),transparent);
opacity:.4;
}

.card:hover{border-color:rgba(0,232,184,.25);}

.card-header{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:1.2rem;
}

.card-title{
font-family:var(--font-head);
font-size:.85rem;
font-weight:700;
letter-spacing:.06em;
text-transform:uppercase;
color:var(--text);
}

.badge{
display:inline-block;
font-size:.58rem;font-weight:700;
padding:.22rem .55rem;
border-radius:20px;
letter-spacing:.07em;
text-transform:uppercase;
}

.badge-live{background:rgba(6,214,160,.12);color:var(--safe);border:1px solid rgba(6,214,160,.3);}
.badge-danger{background:rgba(240,45,58,.14);color:var(--danger);border:1px solid rgba(240,45,58,.3);}
.badge-warning{background:rgba(255,193,59,.12);color:var(--warning);border:1px solid rgba(255,193,59,.3);}
.badge-biolume{background:rgba(0,232,184,.1);color:var(--biolume);border:1px solid rgba(0,232,184,.25);}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}

.stat-card{
background:var(--glass);
border:1px solid var(--border);
border-radius:12px;
padding:1.2rem 1.4rem;
backdrop-filter:blur(10px);
transition:transform .3s,border-color .3s;
}

.stat-card:hover{transform:translateY(-2px);border-color:rgba(0,232,184,.3);}

.stat-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}

.stat-value{
font-family:var(--font-head);
font-size:1.9rem;
font-weight:800;
line-height:1;
}

.stat-sub{font-size:.6rem;color:var(--muted);margin-top:.3rem;}

.c-biolume{color:var(--biolume);}
.c-danger{color:var(--danger);}
.c-warning{color:var(--warning);}
.c-safe{color:var(--safe);}
.c-muted{color:var(--muted);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:1.25rem;}
.grid-a{display:grid;grid-template-columns:1.4fr 1fr;gap:1.25rem;}
.mb{margin-bottom:1.25rem;}

.chart-wrap{position:relative;height:230px;}
.chart-wrap-tall{position:relative;height:300px;}

.risk-row{
display:grid;
grid-template-columns:1fr 110px 52px 72px;
align-items:center;
gap:.9rem;
padding:.75rem 0;
border-bottom:1px solid rgba(0,232,184,.06);
}

.risk-row:last-child{border-bottom:none;}

.risk-name{font-size:.78rem;}
.risk-sci{font-size:.6rem;color:var(--muted);font-style:italic;margin-top:2px;}

.risk-bar{width:100%;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.risk-fill{height:100%;border-radius:2px;}

.risk-pct{font-size:.68rem;}

.rb{font-size:.58rem;padding:.2rem .45rem;border-radius:4px;font-weight:700;text-transform:uppercase;text-align:center;}
.rb-critical{background:rgba(240,45,58,.18);color:var(--danger);}
.rb-high{background:rgba(255,193,59,.15);color:var(--warning);}
.rb-moderate{background:rgba(0,232,184,.1);color:var(--biolume);}
.rb-low{background:rgba(6,214,160,.12);color:var(--safe);}

.btn{
padding:.65rem 1.2rem;
background:var(--biolume);
color:var(--deep);
border:none;border-radius:8px;
font-family:var(--font-mono);
font-size:.72rem;font-weight:700;
letter-spacing:.06em;text-transform:uppercase;
cursor:pointer;transition:all .25s;
}

.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}

.btn-outline{
background:transparent;
color:var(--biolume);
border:1px solid var(--biolume);
}

.btn-outline:hover{background:rgba(0,232,184,.1);}

#toast{
position:fixed;bottom:1.75rem;right:1.75rem;z-index:999;
background:rgba(6,214,160,.12);
border:1px solid var(--safe);
border-radius:10px;
padding:.9rem 1.4rem;
color:var(--safe);
font-size:.73rem;
opacity:0;transform:translateY(8px);
transition:all .35s;pointer-events:none;
}

#toast.show{opacity:1;transform:translateY(0);}

@media(max-width:900px){
.stat-grid{grid-template-columns:repeat(2,1fr);}
.grid-2,.grid-3,.grid-a{grid-template-columns:1fr;}
.page{padding:1.25rem 1rem 3rem;}
.topbar{padding:.75rem 1rem;}
.nav-links{gap:.1rem;}
.nav-link{padding:.45rem .6rem;font-size:.65rem;}
}
</style>

{% block head %}{% endblock %}
</head>

<body>

<div id="particles"></div>

<header class="topbar">
<a href="{{ url_for('index') }}" class="brand">
<svg class="brand-icon" viewBox="0 0 38 38" fill="none">
<circle cx="19" cy="19" r="18" stroke="#00e8b8" stroke-width="1.2" opacity=".35"/>
<path d="M5 19 C10 11 15 7 19 7 C23 7 28 11 33 19 C28 27 23 31 19 31 C15 31 10 27 5 19Z" fill="none" stroke="#00e8b8" stroke-width="1.3"/>
<circle cx="19" cy="19" r="5" fill="#00e8b8" opacity=".25"/>
<circle cx="19" cy="19" r="2" fill="#00e8b8"/>
<line x1="19" y1="7" x2="19" y2="31" stroke="#00e8b8" stroke-width=".5" opacity=".25"/>
<line x1="5" y1="19" x2="33" y2="19" stroke="#00e8b8" stroke-width=".5" opacity=".25"/>
</svg>

<div>
<div class="brand-name">OceanWatch</div>
<div class="brand-sub">Marine Intelligence Platform</div>
</div>
</a>

<nav class="nav-links">
<a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint=='index' %}active{% endif %}">Dashboard</a>
<a href="{{ url_for('analysis') }}" class="nav-link {% if request.endpoint=='analysis' %}active{% endif %}">Analysis</a>
</nav>

<div class="topbar-right">
<div class="live-pill"><div class="live-dot"></div> Live API</div>
</div>
</header>

<main class="page">
{% block content %}{% endblock %}
</main>

<div id="toast"></div>

<script>
(function(){
const c=document.getElementById('particles');
for(let i=0;i<22;i++){
const p=document.createElement('div');
p.className='p';
const sz=Math.random()*2.5+1;
p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:#00e8b8;animation-duration:${Math.random()*18+14}s;animation-delay:${Math.random()*20}s;`;
c.appendChild(p);
}
})();

function showToast(msg,type='success'){
const t=document.getElementById('toast');
t.textContent=msg;
t.style.color= type==='error'? 'var(--danger)':'var(--safe)';
t.style.borderColor=type==='error'?'var(--danger)':'var(--safe)';
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),3500);
}
</script>

{% block scripts %}{% endblock %}

</body>
</html>
